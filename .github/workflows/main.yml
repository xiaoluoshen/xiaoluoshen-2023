name: 🌿 Generate Green Wall

on:
  workflow_dispatch:  # 允许手动触发

jobs:
  green-wall:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: 🛠️ Configure Git
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"

      - name: 🌱 Generate 365 days of commits
        run: |
          for i in {0..364}; do
            # 计算 i 天前的日期
            DATE=$(date -d "$i days ago" +"%Y-%m-%dT12:00:00")
            # 创建或追加日志文件
            echo "Contribution on $DATE" >> contributions.txt
            # 添加并提交，指定历史时间
            git add contributions.txt
            GIT_AUTHOR_DATE="$DATE" GIT_COMMITTER_DATE="$DATE" git commit -m "Fix $DATE"
          done

      - name: 🚀 Force push to main branch
        run: |
          git push origin main --force
